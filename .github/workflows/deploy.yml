name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel runs in-progress
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages   # unlocks the WEB3FORMS_ACCESS_KEY environment secret
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fail fast if the secret is missing
        # Catches the classic mistake of adding the secret under the wrong
        # scope (repository vs. environment) before writing an empty config.js.
        env:
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: |
          if [ -z "${WEB3FORMS_ACCESS_KEY}" ]; then
            echo "::error::WEB3FORMS_ACCESS_KEY is empty. Add it under Settings → Environments → github-pages."
            exit 1
          fi

      - name: Inject Web3Forms key into config.js
        # Write config.js from the environment secret at build time.
        # config.js is gitignored, so this is the only way Pages gets it.
        env:
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: |
          cat > config.js <<EOF
          /* Auto-generated by GitHub Actions at deploy time.
             The access key is injected from the WEB3FORMS_ACCESS_KEY
             environment secret (Settings → Environments → github-pages). */
          window.SITE_CONFIG = {
            web3formsKey: "${WEB3FORMS_ACCESS_KEY}"
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
