<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="a5t a5d">
  <title id="a5t">Bath-fan adapter icon</title>
  <desc id="a5d">Line icon of a bath-fan hose connected through a sealed adapter to a roof vent, routing moist air fully outside.</desc>
  <defs>
    <style>
<![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap');
      :root { --ink:#0B1220; --panel:#141E2E; --text:#F8FAFC; --ember:#FF6A1A; --crisp:#38BDF8; }
      .a5-bg     { fill: url(#plate); }
      .a5-roof   { fill:none; stroke: var(--text); stroke-width:4; stroke-linecap:round; stroke-linejoin:round; }
      .a5-vent   { stroke: var(--text); stroke-width:3; fill: var(--panel); stroke-linejoin:round; }
      .a5-duct   { stroke: var(--text); stroke-width:3; fill:none; }
      .a5-adapter{ fill: var(--ember); stroke: #FFFFFF; stroke-width:2; }
      .a5-seal   { stroke:#0B1220; stroke-width:1.6; }
      .a5-hose   { fill:none; stroke: var(--crisp); stroke-width:6; stroke-linecap:round; }
      .a5-hose-dash { fill:none; stroke: #BFEAFF; stroke-width:1.4; stroke-dasharray:3 5; stroke-linecap:round; }
      .a5-airflow{ fill:none; stroke: var(--crisp); stroke-width:3; stroke-linecap:round; stroke-dasharray:4 5; }
      .a5-dash { animation: a5-flow 2.2s linear infinite; }
      @keyframes a5-flow { to { stroke-dashoffset: -18; } }
      @media (prefers-reduced-motion: reduce){ .a5-dash{ animation:none } }
]]>
    </style>
    <radialGradient id="plate" cx="0.3" cy="0.25" r="0.95">
      <stop offset="0" stop-color="#1E2A40"/><stop offset="1" stop-color="#0B1220"/>
    </radialGradient>
    <filter id="a5-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="sa" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#38BDF8"/></marker>
  </defs>

  <rect class="a5-bg" x="8" y="8" width="184" height="184" rx="38"/>
  <g filter="url(#a5-glow)">
    <path class="a5-roof" d="M26 150 L100 92 L174 150"/>
    <g class="a5-vent">
      <path d="M84 101 h32 l-5 16 h-22 z"/>
      <line x1="88" y1="108" x2="112" y2="108"/>
    </g>
    <g class="a5-duct"><line x1="93" y1="117" x2="93" y2="138"/><line x1="107" y1="117" x2="107" y2="138"/></g>
    <g>
      <rect class="a5-adapter" x="84" y="136" width="32" height="16" rx="4"/>
      <g class="a5-seal"><line x1="86" y1="140" x2="114" y2="140"/><line x1="86" y1="148" x2="114" y2="148"/></g>
    </g>
    <path class="a5-hose" d="M100 152 C 100 166, 60 168, 48 162"/>
    <path class="a5-hose-dash" d="M100 152 C 100 166, 60 168, 48 162"/>
    <path class="a5-airflow a5-dash" d="M52 160 C 70 150, 95 140, 100 110" marker-end="url(#sa)"/>
  </g>
</svg>
