<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-labelledby="p1t p1d">
  <title id="p1t">Four warning signs of attic rain</title>
  <desc id="p1d">Four illustrated warning signs a homeowner can spot themselves: ceiling stain, frost on nail tips, damp attic insulation, and peeling paint near the ceiling.</desc>

  <defs>
    <style>
<![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
      :root { --ink:#0B1220; --panel:#141E2E; --text:#F8FAFC; --muted:#94A3B8; --ember:#FF6A1A; --crisp:#38BDF8; }
      .w-bg   { fill: url(#wbg); }
      .w-title{ fill: var(--text); font-size:28px; font-weight:900; }
      .w-sub  { fill: var(--muted); font-size:15px; }
      .w-card { fill: var(--panel); stroke: #2A3B55; stroke-width:2; }
      .w-h    { fill: var(--text); font-size:16px; font-weight:800; }
      .w-d    { fill: var(--muted); font-size:12px; }
      .w-alert{ fill: var(--ember); font-size:13px; font-weight:800; }
      .w-line { stroke: var(--crisp); stroke-width:3; fill:none; stroke-linejoin:round; }
      .w-drip-anim { transform-box: fill-box; transform-origin: center; animation: w-drip 3.4s ease-in infinite; }
      @keyframes w-drip { 0%{ transform: translateY(-6px); opacity:0 } 25%{ opacity:1 } 100%{ transform: translateY(0); opacity:.85 } }
      @media (prefers-reduced-motion: reduce){ .w-drip-anim{ animation:none } }
]]>
    </style>
    <linearGradient id="wbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#141E2E"/></linearGradient>
    <filter id="w-card-soft" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect class="w-bg" width="800" height="500"/>
  <text class="w-title" x="60" y="60" font-family="Inter, system-ui, sans-serif">What you'll see</text>
  <text class="w-sub"   x="60" y="92" font-family="Inter, system-ui, sans-serif">Four signs a homeowner can check themselves — any one is worth a call.</text>

  <g font-family="Inter, system-ui, sans-serif">
    <!-- card 1: ceiling stain -->
    <g>
      <rect class="w-card" x="60" y="130" width="320" height="160" rx="14" filter="url(#w-card-soft)"/>
      <g class="w-line"><line x1="92" y1="170" x2="332" y2="170"/></g>
      <path d="M150 170 q30 18 60 0 q30 -18 60 0 v8 q-30 -10 -60 0 q-30 10 -60 0 z" fill="#FF6A1A" opacity="0.55"/>
      <g class="w-drip-anim" fill="#FF6A1A"><circle cx="170" cy="208" r="3"/><circle cx="195" cy="220" r="2.5"/><circle cx="240" cy="218" r="3"/></g>
      <text class="w-h" x="92" y="262">1.  Ceiling stain</text>
      <text class="w-d" x="92" y="282">A yellow-brown patch, often after a thaw.</text>
    </g>
    <!-- card 2: frost on nail tips -->
    <g>
      <rect class="w-card" x="420" y="130" width="320" height="160" rx="14" filter="url(#w-card-soft)"/>
      <g class="w-line">
        <line x1="452" y1="170" x2="708" y2="170"/>
        <line x1="490" y1="170" x2="490" y2="200"/><line x1="560" y1="170" x2="560" y2="208"/><line x1="630" y1="170" x2="630" y2="202"/>
      </g>
      <g fill="#BFEAFF" stroke="#38BDF8" stroke-width="1.5"><path d="M480 170 q10 -16 20 0 z"/><path d="M550 170 q10 -18 20 0 z"/><path d="M620 170 q10 -16 20 0 z"/></g>
      <text class="w-h" x="452" y="262">2.  Frost on nail tips</text>
      <text class="w-d" x="452" y="282">White tufts sticking through the attic.</text>
    </g>
    <!-- card 3: damp insulation -->
    <g>
      <rect class="w-card" x="60" y="310" width="320" height="160" rx="14" filter="url(#w-card-soft)"/>
      <g class="w-line" fill="#1E2A40"><rect x="92" y="350" width="256" height="34" rx="6"/></g>
      <path d="M150 350 q60 0 110 0 v18 q-50 -10 -110 0 z" fill="#38BDF8" opacity="0.45"/>
      <g stroke="#38BDF8" stroke-width="1.5" opacity="0.6" fill="none"><path d="M120 367 q6 -5 12 0 q6 5 12 0"/><path d="M260 367 q6 -5 12 0 q6 5 12 0"/></g>
      <g class="w-drip-anim" fill="#38BDF8" stroke="#BFEAFF" stroke-width="1.4"><circle cx="170" cy="400" r="4"/><circle cx="205" cy="412" r="3"/><circle cx="245" cy="405" r="4"/></g>
      <text class="w-h" x="92" y="442">3.  Damp insulation</text>
      <text class="w-d" x="92" y="462">Mat feels wet, heavy, or has dark spots.</text>
    </g>
    <!-- card 4: peeling paint -->
    <g>
      <rect class="w-card" x="420" y="310" width="320" height="160" rx="14" filter="url(#w-card-soft)"/>
      <g class="w-line">
        <line x1="452" y1="350" x2="708" y2="350"/>
        <path d="M500 350 q14 14 28 0 q14 -14 28 0" fill="#141E2E"/><path d="M580 350 q10 10 20 0 q10 -10 20 0" fill="#141E2E"/>
      </g>
      <g fill="#FF6A1A"><path d="M498 348 q14 -8 28 0 l-2 4 q-12 -6 -24 0 z"/><path d="M578 348 q10 -6 20 0 l-2 4 q-8 -4 -16 0 z"/></g>
      <text class="w-h" x="452" y="402">4.  Peeling paint</text>
      <text class="w-d" x="452" y="422">Bubbling or flaking near the ceiling line.</text>
      <text class="w-alert" x="452" y="448">If you see any of these — call us.</text>
    </g>
  </g>
</svg>
