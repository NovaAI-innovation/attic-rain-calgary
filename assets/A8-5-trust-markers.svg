<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-labelledby="p5t p5d">
  <title id="p5t">Why homeowners trust us</title>
  <desc id="p5d">Timeline of fifteen years working on Calgary attics, beside small trust icons: licensed, insured, Calgary-only, written quote, and warranty.</desc>

  <defs>
    <style>
<![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
      :root { --ink:#0B1220; --panel:#141E2E; --text:#F8FAFC; --muted:#94A3B8; --ember:#FF6A1A; --crisp:#38BDF8; }
      .t-bg    { fill: url(#tbg); }
      .t-title { fill: var(--text); font-size:28px; font-weight:900; }
      .t-sub   { fill: var(--muted); font-size:15px; }
      .t-line  { stroke: #2A3B55; stroke-width:3; }
      .t-yr    { fill: var(--text); font-size:13px; font-weight:800; }
      .t-yr-d  { fill: var(--muted); font-size:13px; }
      .t-card  { fill: var(--panel); stroke: #2A3B55; stroke-width:1.5; }
      .t-disc  { fill: #1E2A40; }
      .t-name  { fill: var(--text); font-weight:800; }
      .t-d     { fill: var(--muted); font-size:12px; }
      .t-node  { animation: t-glow 3s ease-in-out infinite; }
      @keyframes t-glow { 0%,100%{ opacity:.85 } 50%{ opacity:1 } }
      @media (prefers-reduced-motion: reduce){ .t-node{ animation:none } }
]]>
    </style>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#141E2E"/></linearGradient>
    <filter id="t-card-soft" x="-8%" y="-20%" width="116%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect class="t-bg" width="800" height="500"/>
  <text class="t-title" x="60" y="64" font-family="Inter, system-ui, sans-serif">Why homeowners trust us</text>
  <text class="t-sub"   x="60" y="92" font-family="Inter, system-ui, sans-serif">15 years on Calgary attics — and the small things that matter to you.</text>

  <g font-family="Inter, system-ui, sans-serif">
    <line class="t-line" x1="120" y1="150" x2="120" y2="400"/>
    <g class="t-node">
      <circle cx="120" cy="170" r="8" fill="#FF6A1A"/><text class="t-yr"   x="140" y="174">2010</text><text class="t-yr-d" x="140" y="190">Started in Calgary</text>
      <circle cx="120" cy="240" r="8" fill="#FF6A1A"/><text class="t-yr"   x="140" y="244">2015</text><text class="t-yr-d" x="140" y="260">Attic-rain focus</text>
      <circle cx="120" cy="310" r="8" fill="#FF6A1A"/><text class="t-yr"   x="140" y="314">2020</text><text class="t-yr-d" x="140" y="330">3-step system</text>
      <circle cx="120" cy="380" r="8" fill="#FF6A1A"/><text class="t-yr"   x="140" y="384">2025</text><text class="t-yr-d" x="140" y="400">1,000+ Calgary homes</text>
    </g>
  </g>

  <g font-family="Inter, system-ui, sans-serif" font-size="14">
    <g>
      <rect class="t-card" x="380" y="150" width="320" height="44" rx="10" filter="url(#t-card-soft)"/>
      <circle class="t-disc" cx="402" cy="172" r="14"/>
      <path d="M396 172 l5 5 l9 -10" fill="none" stroke="#FF6A1A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="t-name" x="426" y="168">Alberta-licensed roofing</text><text class="t-d" x="426" y="186">License number in the footer.</text>
    </g>
    <g>
      <rect class="t-card" x="380" y="204" width="320" height="44" rx="10" filter="url(#t-card-soft)"/>
      <circle class="t-disc" cx="402" cy="226" r="14"/>
      <path d="M402 218 l8 4 v5 c0 5 -4 8 -8 9 c-4 -1 -8 -4 -8 -9 v-5 z" fill="none" stroke="#FF6A1A" stroke-width="2.5" stroke-linejoin="round"/>
      <text class="t-name" x="426" y="222">Fully insured</text><text class="t-d" x="426" y="240">Liability + workers' coverage.</text>
    </g>
    <g>
      <rect class="t-card" x="380" y="258" width="320" height="44" rx="10" filter="url(#t-card-soft)"/>
      <circle class="t-disc" cx="402" cy="280" r="14"/>
      <path d="M396 280 h12 M402 274 v12" stroke="#FF6A1A" stroke-width="3" stroke-linecap="round"/>
      <text class="t-name" x="426" y="276">Calgary-only</text><text class="t-d" x="426" y="294">We don't travel — we know every neighborhood.</text>
    </g>
    <g>
      <rect class="t-card" x="380" y="312" width="320" height="44" rx="10" filter="url(#t-card-soft)"/>
      <circle class="t-disc" cx="402" cy="334" r="14"/>
      <rect x="394" y="324" width="16" height="20" rx="2" fill="none" stroke="#FF6A1A" stroke-width="2.5"/>
      <line x1="397" y1="330" x2="407" y2="330" stroke="#FF6A1A" stroke-width="2"/><line x1="397" y1="334" x2="407" y2="334" stroke="#FF6A1A" stroke-width="2"/><line x1="397" y1="338" x2="404" y2="338" stroke="#FF6A1A" stroke-width="2"/>
      <text class="t-name" x="426" y="330">Written quote before any work</text><text class="t-d" x="426" y="348">No surprises, no pressure.</text>
    </g>
    <g>
      <rect class="t-card" x="380" y="366" width="320" height="44" rx="10" filter="url(#t-card-soft)"/>
      <circle class="t-disc" cx="402" cy="388" r="14"/>
      <path d="M394 388 a8 8 0 1 1 16 0 a8 8 0 1 1 -16 0" fill="none" stroke="#FF6A1A" stroke-width="2.5"/>
      <text x="402" y="392" text-anchor="middle" fill="#FF6A1A" font-weight="900" font-size="12">5y</text>
      <text class="t-name" x="426" y="384">Workmanship warranty</text><text class="t-d" x="426" y="402">5 years on the work we do.</text>
    </g>
  </g>
</svg>
